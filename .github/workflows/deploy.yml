name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-flight runs from the same branch when a new push lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Apply D1 migrations
        # Runs every deploy. `wrangler d1 migrations apply` is idempotent —
        # already-applied migrations are skipped — so this is safe to run on
        # every push. Without this step, schema drift between local dev and
        # the prod DB silently breaks routes that touch new tables (e.g.
        # users / magic_links / sessions added in 0001_auth.sql).
        #
        # We invoke wrangler directly (not via cloudflare/wrangler-action)
        # because the action swallows wrangler's stderr in some failure
        # modes; running it ourselves makes the real error visible in the
        # job log. The `yes` pipe pre-confirms the migrations prompt that
        # wrangler shows in non-CI tty mode.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          yes | npx wrangler d1 migrations apply nbmecalc-prod --remote

      - name: Prepare PDF renderer shared secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          PDF_RENDERER_SECRET="$(printf "%s" "$CLOUDFLARE_API_TOKEN" | sha256sum | awk '{print $1}')"
          echo "::add-mask::$PDF_RENDERER_SECRET"
          echo "PDF_RENDERER_SECRET=$PDF_RENDERER_SECRET" >> "$GITHUB_ENV"

      - name: Deploy PDF renderer Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config workers/pdf-renderer/wrangler.toml

      - name: Configure PDF renderer secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PDF_RENDERER_SECRET: ${{ env.PDF_RENDERER_SECRET }}
        run: |
          printf "%s" "$PDF_RENDERER_SECRET" | npx wrangler secret put PDF_RENDERER_SECRET --config workers/pdf-renderer/wrangler.toml
          printf "%s" "$PDF_RENDERER_SECRET" | npx wrangler pages secret put PDF_RENDERER_SECRET --project-name=nbmecalc

      - name: Build for Cloudflare Pages
        run: npx @cloudflare/next-on-pages
        env:
          # Surface only the *public* env vars at build time. All secrets
          # live in Cloudflare Pages and are read at runtime by the Worker.
          NEXT_PUBLIC_SITE_URL: https://nbmecalc.com

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=nbmecalc --branch=main
